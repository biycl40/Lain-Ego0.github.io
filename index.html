<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lain's database</title>
  
  <script>
    const savedTheme = localStorage.getItem('theme') || 'light';
    document.documentElement.setAttribute('data-theme', savedTheme);
  </script>

  <link rel="stylesheet" href="assets/css/style.css">
  <link rel="stylesheet" href="https://cdn.bootcdn.net/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
  <nav>
    <div class="container nav-container">
      <a href="#" class="logo" aria-label="Lain's database">
        <span class="logo-terminal" aria-hidden="true"><span class="terminal-user">lain@db</span><span class="terminal-path">:~</span><span class="terminal-symbol">$</span><span class="terminal-cursor"></span></span>
      </a>
      
      <div class="nav-actions">
        <div class="nav-links">
          <a href="#projects" data-i18n="nav.projects">Projects</a>
          <a href="#documents" data-i18n="nav.documents">Docs</a>
          <a href="#timeline" data-i18n="nav.timeline">Timeline</a>
          <a href="#skills" data-i18n="nav.skills">Stack</a>
        </div>
        
        <div class="nav-controls">
          <button class="control-btn lang-toggle" aria-label="Toggle Language">English</button>
          <button class="control-btn theme-toggle" aria-label="Toggle Theme">
            <i class="fas fa-sun sun-icon"></i>
            <i class="fas fa-moon moon-icon"></i>
          </button>
        </div>
      </div>
    </div>
  </nav>

  <section id="intro" class="intro">
    <div class="bg-decoration"></div>
    <div class="container flex-center column">
      <div class="avatar-container">
        <img src="assets/images/Avatar.jpg" alt="Avatar" class="avatar" data-i18n="intro.avatarAlt">
        <div class="avatar-glow"></div>
      </div>
      <h1 class="gradient-text" data-i18n="intro.title">Hello, I'm Lain-Ego</h1>
      <p class="subtitle" data-i18n="intro.desc">...</p>
      <div class="intro-contact-links" aria-label="Social Links"></div>
    </div>
  </section>

  <section id="projects" class="section-padding">
    <div class="container">
      <h2 data-i18n="projects.title">My Projects</h2>
      <div class="projects-grid"></div>
    </div>
  </section>

  <section id="documents" class="section-padding">
    <div class="container">
      <h2 data-i18n="documents.title">Documents</h2>
      <div class="documents-grid"></div>
    </div>
  </section>

  <section id="timeline" class="section-padding">
    <div class="container">
      <h2 data-i18n="timeline.title">Timeline</h2>
      <div class="timeline-container"></div>
    </div>
  </section>

  <section id="skills" class="section-padding">
    <div class="container">
      <h2 data-i18n="skills.title">Tech Stack</h2>
      <div class="skills-wrapper"></div>
    </div>
  </section>

  <footer data-i18n="footer.copyright">© 2023-2026 Lain-Ego | 个人主页</footer>

  <script src="assets/js/i18n.js"></script>
  <script src="assets/js/main.js"></script>
<script>
// 加载你修改的 lang/en.json
fetch('lang/en.json')
  .then(response => response.json())
  .then(lang => {
    console.log("✅ 语言文件加载成功", lang);

    // --- 这里根据你的页面结构，替换对应的文字 ---
    // 1. 替换导航栏文字（例子，按你页面实际元素调整）
    document.querySelector('.logo').setAttribute('aria-label', lang.nav.home);

    // 2. 替换自我介绍标题（把 #intro-title 换成你页面里实际的元素ID/类名）
    // document.querySelector('#intro-title').textContent = lang.intro.title;

    // 3. 替换自我介绍描述
    // document.querySelector('#intro-desc').textContent = lang.intro.desc;

    // 更多元素可以按这个格式添加
  })
  .catch(err => {
    console.error("❌ 加载语言文件失败：", err);
    alert("语言文件加载失败，请检查路径和格式");
  });
</script>
</body>
</html>
